name = "private-board-watch-scheduler"
main = "scheduler/dispatch-workflow.js"
compatibility_date = "2026-04-25"

[vars]
GITHUB_OWNER = "piranxpg"
GITHUB_REPO = "private-board-watch"
GITHUB_WORKFLOW_ID = "refresh-feed.yml"
GITHUB_REF = "main"

[triggers]
crons = [ "14,44 * * * *" ]

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
persist = true
