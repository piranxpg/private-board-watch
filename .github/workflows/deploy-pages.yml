name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-pages.yml"
      - "functions/**"
      - "public/**"
      - "wrangler.toml"
      - "package.json"
      - "package-lock.json"

concurrency:
  group: deploy-pages
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Validate frontend scripts
        run: |
          node --check public/assets/app.js
          node --check functions/api/feed.js

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy public --project-name private-board-watch --branch main
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
