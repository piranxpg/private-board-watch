name: Refresh feed

on:
  workflow_dispatch:

concurrency:
  group: refresh-feed
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install crawler dependencies
        run: pip install -r crawler/requirements.txt

      - name: Ensure MyPi owner id is preserved
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("crawler/crawl_to_kv.py")
          text = path.read_text(encoding="utf-8")
          old = 'keep_keys = {"id", "no", "num", "document_srl", "wr_id", "idx", "code", "bo_table", "table", "b"}'
          new = 'keep_keys = {"id", "no", "num", "document_srl", "wr_id", "idx", "code", "bo_table", "table", "b", "nid"}'
          if old in text:
              path.write_text(text.replace(old, new), encoding="utf-8")
          elif '"nid"' not in text:
              raise SystemExit("crawler/crawl_to_kv.py must preserve the MyPi nid query parameter")
          PY

      - name: Ensure fallback dates preserve list order
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("crawler/crawl_to_kv.py")
          text = path.read_text(encoding="utf-8")

          old_return = "    return datetime.now(KST).isoformat()\n\n\ndef extract_candidate_published_at"
          if old_return in text:
              text = text.replace(old_return, "    return \"\"\n\n\ndef extract_candidate_published_at")

          old_loop = "    items: list[dict[str, Any]] = []\n    item_limit = source_item_limit(source, settings)\n    for candidate in candidates:"
          new_loop = "    items: list[dict[str, Any]] = []\n    item_limit = source_item_limit(source, settings)\n    crawl_started = datetime.now(KST)\n    for position, candidate in enumerate(candidates):"
          if old_loop in text:
              text = text.replace(old_loop, new_loop)

          old_date = '            published_at = candidate.get("publishedAt") or parse_published_at(soup)\n            if not is_recent'
          new_date = '            published_at = candidate.get("publishedAt") or parse_published_at(soup)\n            if not published_at:\n                published_at = (crawl_started - timedelta(seconds=position)).isoformat()\n            if not is_recent'
          if old_date in text:
              text = text.replace(old_date, new_date)

          path.write_text(text, encoding="utf-8")
          PY

      - name: Download existing feed from KV
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          KV_KEY: feed:latest
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          from urllib.parse import quote

          import requests

          account_id = os.environ["CLOUDFLARE_ACCOUNT_ID"]
          namespace_id = os.environ["CLOUDFLARE_KV_NAMESPACE_ID"]
          api_token = os.environ["CLOUDFLARE_API_TOKEN"]
          key = os.environ.get("KV_KEY", "feed:latest")
          url = (
              "https://api.cloudflare.com/client/v4/accounts/"
              f"{account_id}/storage/kv/namespaces/{namespace_id}/values/{quote(key, safe='')}"
          )

          response = requests.get(
              url,
              headers={"Authorization": f"Bearer {api_token}"},
              timeout=30,
          )
          if response.status_code == 404:
              print("No existing feed found; starting fresh.")
          else:
              response.raise_for_status()
              Path("crawler/feed.latest.json").write_text(response.text, encoding="utf-8")
              print("Downloaded existing feed from KV.")
          PY

      - name: Prune inactive, replace-existing, and stale links
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          feed_path = Path("crawler/feed.latest.json")
          if not feed_path.exists():
              raise SystemExit(0)

          config = json.loads(Path("crawler/board_sources.json").read_text(encoding="utf-8"))
          active_ids = {
              source.get("id")
              for source in config.get("sources", [])
              if source.get("id") and source.get("enabled", True)
          }
          replace_ids = {
              source.get("id")
              for source in config.get("sources", [])
              if source.get("id") and source.get("replace_existing")
          }
          if not active_ids and not replace_ids:
              raise SystemExit(0)

          payload = json.loads(feed_path.read_text(encoding="utf-8"))

          def keep_item(item):
              link = item.get("link", "")
              if item.get("sourceId") not in active_ids or item.get("sourceId") in replace_ids:
                  return False
              if item.get("sourceId") == "etoland-humor" and "/bbs/board.php?bo_table=etohumor07" in link:
                  return False
              return True

          payload["items"] = [item for item in payload.get("items", []) if keep_item(item)]
          payload["sources"] = [
              source
              for source in payload.get("sources", [])
              if source.get("id") in active_ids and source.get("id") not in replace_ids
          ]
          feed_path.write_text(json.dumps(payload, ensure_ascii=False, indent=2), encoding="utf-8")
          print("Kept active sources:", ", ".join(sorted(active_ids)))
          if replace_ids:
              print("Pruned replace-existing sources:", ", ".join(sorted(replace_ids)))
          PY

      - name: Crawl and upload feed
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          KV_KEY: feed:latest
        run: python crawler/crawl_to_kv.py --out crawler/feed.latest.json

      - name: Merge Soccerline feed
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          KV_KEY: feed:latest
        run: python crawler/soccerline_to_kv.py --feed crawler/feed.latest.json --config crawler/board_sources.json

      - name: Merge Dogdrip feed
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          KV_KEY: feed:latest
        run: python crawler/dogdrip_to_kv.py --feed crawler/feed.latest.json --config crawler/board_sources.json
